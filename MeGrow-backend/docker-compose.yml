version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: megrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: megrow_database
      POSTGRES_USER: megrow_admin_user
      POSTGRES_PASSWORD: megrow_admin_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_megrow_data:/var/lib/postgresql/data

volumes:
  postgres_megrow_data: